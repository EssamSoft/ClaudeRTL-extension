<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Styler</title>
  <style>
    body {
      width: 240px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #fafafa;
      color: #333;
      margin: 0;
    }

    h3 {
      margin: 0 0 16px;
      font-size: 16px;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      font-size: 14px;
      border-bottom: 1px solid #eaeaea;
    }

    .toggle-row:last-of-type {
      border-bottom: none;
    }

    .switch {
      position: relative;
      width: 40px;
      height: 22px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #d1d5db;
      border-radius: 22px;
      transition: .3s ease-in-out;
    }

    .slider:before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 2px;
      bottom: 2px;
      background: white;
      border-radius: 50%;
      transition: .3s ease-in-out;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
    }

    input:checked+.slider {
      background: #ed703a;
    }

    input:checked+.slider:before {
      transform: translateX(18px);
    }

    input:focus-visible+.slider {
      outline: 2px solid #8b5cf6;
      outline-offset: 2px;
    }

    #status {
      font-size: 12px;
      color: #10b981;
      margin-top: 12px;
      text-align: center;
      height: 16px;
      font-weight: 500;
    }

    #not-claude {
      color: #ef4444;
      font-size: 13px;
      text-align: center;
      display: none;
      padding: 12px;
      background: #fee2e2;
      border-radius: 6px;
    }

    #controls {
      display: flex;
      flex-direction: column;
    }
  </style>
</head>

<body>
  <h3><img
      src="https://raw.githubusercontent.com/lobehub/lobe-icons/refs/heads/master/packages/static-png/dark/claude-color.png"
      alt="" width="20" height="20" /> Claude Styler</h3>

  <div id="not-claude" role="alert">⚠️ هذه الصفحة ليست claude.ai</div>

  <div id="controls">
    <div class="toggle-row">
      <span>Main RTL</span>
      <label class="switch">
        <input type="checkbox" id="rtl" aria-label="Toggle Main RTL">
        <span class="slider"></span>
      </label>
    </div>
    <div class="toggle-row">
      <span>Force Code RTL</span>
      <label class="switch">
        <input type="checkbox" id="code-rtl" aria-label="Toggle Force Code RTL">
        <span class="slider"></span>
      </label>
    </div>
    <div class="toggle-row">
      <span>Bigger Text</span>
      <label class="switch">
        <input type="checkbox" id="big-text" aria-label="Toggle Bigger Text">
        <span class="slider"></span>
      </label>
    </div>
    <div class="toggle-row">
      <span>Extra Width</span>
      <label class="switch">
        <input type="checkbox" id="extra-width" aria-label="Toggle Extra Width">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div id="status" aria-live="polite"></div>

  <script src="popup.js"></script>
</body>

</html>
